<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room3D Designer</title>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- SweetAlert2 CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11.10.7/dist/sweetalert2.min.css">
    <!-- Main CSS -->
    <link rel="stylesheet" href="/Design/design.css">
</head>

<body>
    <div class="designer-header">
        <div class="logo"><img src="/images/logo.png" alt="Logo"> Room3D Designer</div>
        <div class="header-actions">
            <button title="Lưu"><i class="fas fa-save"></i></button>
            <button title="Xuất ảnh"><i class="fas fa-image"></i></button>
            <button title="Hoàn tác"><i class="fas fa-undo"></i></button>
            <button title="Làm lại"><i class="fas fa-redo"></i></button>
            <button title="Xóa"><i class="fas fa-trash"></i></button>
        </div>
    </div>
    <div class="designer-workspace">
        <aside class="designer-sidebar">
            <div class="sidebar-tabs">
                <button class="sidebar-tab active" data-tab="library"><i class="fas fa-couch"></i> Thư viện</button>
                <button class="sidebar-tab" data-tab="materials"><i class="fas fa-paint-roller"></i> Vật liệu</button>
                <button class="sidebar-tab" data-tab="projects"><i class="fas fa-folder-open"></i> Dự án</button>
            </div>
            <div class="sidebar-content" id="sidebar-library">
                <!-- Nội dung thư viện nội thất sẽ được load động -->
                <div style="color:#a0aec0;">Chọn danh mục để thêm vào phòng của bạn.</div>
            </div>
            <div class="sidebar-content" id="sidebar-materials" style="display:none;">
                <div style="color:#a0aec0;">Chọn vật liệu để áp dụng cho đối tượng.</div>
            </div>
            <div class="sidebar-content" id="sidebar-projects" style="display:none;">
                <div style="color:#a0aec0;">Quản lý dự án thiết kế của bạn tại đây.</div>
            </div>
        </aside>
        <main class="designer-canvas-area">
            <div class="designer-toolbar">
                <button class="active" id="btn-2d"><i class="fas fa-border-all"></i> 2D</button>
                <button id="btn-3d"><i class="fas fa-cube"></i> 3D</button>
                <button id="btn-library"><i class="fas fa-couch"></i> Thư viện</button>
                <button id="btn-materials"><i class="fas fa-paint-roller"></i> Vật liệu</button>
                <button id="btn-export"><i class="fas fa-image"></i> Xuất ảnh</button>
                <button id="btn-undo"><i class="fas fa-undo"></i></button>
                <button id="btn-redo"><i class="fas fa-redo"></i></button>
                <button id="btn-delete"><i class="fas fa-trash"></i></button>
            </div>
            <div class="canvas-container">
                <canvas id="canvas2d" width="1200" height="700"></canvas>
                <div id="canvas3d"></div>
            </div>
        </main>
        <aside class="designer-properties">
            <h3>Thuộc tính đối tượng</h3>
            <div id="properties-panel">
                <div style="color:#a0aec0;">Chọn một đối tượng để chỉnh sửa thuộc tính.</div>
            </div>
        </aside>
    </div>
    <!-- Thư viện cần thiết cho 2D/3D, kéo-thả, xuất ảnh, ... -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/interact.js/1.10.17/interact.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dat.gui@0.7.9/build/dat.gui.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lodash.js/4.17.21/lodash.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.10.7/dist/sweetalert2.all.min.js"></script>
    <script src="design.js"></script>
</body>

</html>
